<text fill="#FACC15" font-family="monospace" font-size="12px" font-weight="bold" text-anchor="middle" x="820" y="1714">saudações • fora do escopo</text>

<rect fill="#0B0F19" stroke="#00FF88" stroke-width="1" rx="6" x="1010" y="1675" width="270" height="46"/>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="1145" y="1695">docs / ambos</text>
<text fill="#FACC15" font-family="monospace" font-size="12px" font-weight="bold" text-anchor="middle" x="1145" y="1714">documentos • contatos</text>

