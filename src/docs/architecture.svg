<svg width="1400" height="2880" viewBox="0 0 1400 2880"
xmlns="http://www.w3.org/2000/svg">

<style>
    .bg { fill: #0B0F19; }

    .box {
        fill: #111827;
        stroke: #00FF88;
        stroke-width: 2;
        rx: 14;
        filter: drop-shadow(0 0 8px #00FF88);
    }

    .box-red {
        fill: #111827;
        stroke: #EF4444;
        stroke-width: 2;
        rx: 14;
        filter: drop-shadow(0 0 8px #EF4444);
    }

    .box-yellow {
        fill: #111827;
        stroke: #FACC15;
        stroke-width: 2;
        rx: 14;
        filter: drop-shadow(0 0 8px #FACC15);
    }

    .agent {
        stroke: #A855F7;
        filter: drop-shadow(0 0 18px #A855F7);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { filter: drop-shadow(0 0 10px #A855F7); }
        50% { filter: drop-shadow(0 0 25px #A855F7); }
        100% { filter: drop-shadow(0 0 10px #A855F7); }
    }

    .text-title {
        fill: #00FF88;
        font-family: monospace;
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
    }

    .text-title-red {
        fill: #EF4444;
        font-family: monospace;
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
    }

    .text-title-yellow {
        fill: #FACC15;
        font-family: monospace;
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
    }

    .text-body {
        fill: #00FF88;
        font-family: monospace;
        font-size: 14px;
        text-anchor: middle;
    }

    .text-body-red {
        fill: #EF4444;
        font-family: monospace;
        font-size: 14px;
        text-anchor: middle;
    }

    .text-body-yellow {
        fill: #FACC15;
        font-family: monospace;
        font-size: 14px;
        text-anchor: middle;
    }

    .line {
        stroke: #00FF88;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 8;
        animation: dash 2s linear infinite;
    }

    .line-red {
        stroke: #EF4444;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 8;
        animation: dash 2s linear infinite;
    }

    .line-yellow {
        stroke: #FACC15;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 8;
        animation: dash 2s linear infinite;
    }

    .line-purple {
        stroke: #A855F7;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 8;
        animation: dash 2s linear infinite;
    }

    @keyframes dash {
        to { stroke-dashoffset: -20; }
    }
</style>

<rect class="bg" width="100%" height="100%"/>

<!-- ── USUARIO INICIAL ─────────────────────────────────── -->
<rect class="box" x="300" y="40" width="800" height="90" rx="14"/>
<text class="text-title" x="700" y="75">Usuario WhatsApp</text>
<text class="text-body" x="700" y="105">"Quanto vendemos em janeiro?" / "Quem e o responsavel pelo RH?"</text>

<line class="line" x1="700" y1="130" x2="700" y2="180"/>

<!-- ── EVOLUTION API ──────────────────────────────────────── -->
<rect class="box" x="300" y="180" width="800" height="120" rx="14"/>
<text class="text-title" x="700" y="215">Evolution API (porta 8080)</text>
<text class="text-body" x="700" y="245">Gateway que recebe, valida e encaminha mensagens</text>

<line class="line" x1="700" y1="300" x2="700" y2="350"/>

<!-- ── APP.PY ──────────────────────────────────────────────── -->
<rect class="box" x="300" y="350" width="800" height="155" rx="14"/>
<text class="text-title" x="700" y="378">app.py — Webhook FastAPI (porta 8000)</text>
<text class="text-body" x="700" y="403">Extrai chat_id, sender_name (pushName) e mensagem</text>
<text class="text-body" x="700" y="424">Filtra grupos (@g.us) e mensagens do proprio bot (fromMe)</text>
<text class="text-body" x="700" y="445">Ignora sticker, imagem sem legenda, reacao</text>
<text class="text-body" x="700" y="466">Detecta tipo da mensagem e verifica acesso</text>

<line class="line" x1="700" y1="505" x2="700" y2="545"/>

<!-- ── CONTROLE DE ACESSO ──────────────────────────────────── -->
<rect class="box-yellow" x="300" y="545" width="800" height="230" rx="14"/>
<text class="text-title-yellow" x="700" y="575">Controle de Acesso — access_control.py</text>
<text class="text-body-yellow" x="700" y="603">Consulta SQLite: data/access.db</text>

<text class="text-body-red" x="700" y="642">✗  Nao autorizado  →  envia mensagem de bloqueio e encerra</text>
<text class="text-body-yellow" x="700" y="667">△  Admin + /comando  →  executa comando admin e encerra</text>
<text class="text-body" x="700" y="692">✓  Autorizado (usuario comum)  →  continua o fluxo</text>

<!-- Seta bloqueado (saindo pela direita e voltando) -->
<line class="line-red" x1="1100" y1="642" x2="1160" y2="642"/>
<line class="line-red" x1="1160" y1="642" x2="1160" y2="112"/>
<line class="line-red" x1="1160" y1="112" x2="1100" y2="112"/>
<text fill="#EF4444" font-family="monospace" font-size="12px" text-anchor="middle" x="1200" y="385">bloqueado</text>

<!-- Seta admin (saindo pela esquerda) -->
<line class="line-yellow" x1="300" y1="667" x2="190" y2="667"/>
<rect class="box-yellow" x="10" y="610" width="180" height="120" rx="10"/>
<text class="text-title-yellow" x="100" y="634" font-size="14px">Cmd Admin</text>
<text class="text-body-yellow" x="100" y="660" font-size="13px">/autorizar</text>
<text class="text-body-yellow" x="100" y="679" font-size="13px">/bloquear</text>
<text class="text-body-yellow" x="100" y="698" font-size="13px">/remover</text>
<text class="text-body-yellow" x="100" y="717" font-size="13px">/limpar</text>

<!-- Setas divergentes do controle de acesso -->
<line class="line" x1="500" y1="825" x2="330" y2="905"/>
<line class="line" x1="900" y1="825" x2="1070" y2="905"/>

<!-- Label "se for texto" -->
<rect fill="#0B0F19" stroke="#00FF88" stroke-width="1" rx="6" x="340" y="847" width="130" height="24"/>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="405" y="864">se for texto</text>

<!-- Label "se for audio" -->
<rect fill="#0B0F19" stroke="#00FF88" stroke-width="1" rx="6" x="930" y="847" width="130" height="24"/>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="995" y="864">se for audio</text>

<!-- ── TEXTO DIRETO (esquerda) ────────────────────────────── -->
<rect class="box" x="80" y="905" width="500" height="160" rx="14"/>
<text class="text-title" x="330" y="933">Texto direto</text>
<text class="text-body" x="330" y="960">mensagem extraida de conversation</text>
<text class="text-body" x="330" y="983">ou extendedTextMessage.text</text>
<text class="text-body" x="330" y="1006">passa direto para buffer_message()</text>

<!-- ── TRANSCRIBE (direita) ──────────────────────────────── -->
<rect class="box" x="820" y="905" width="500" height="160" rx="14"/>
<text class="text-title" x="1070" y="933">transcribe.py</text>
<text class="text-body" x="1070" y="960">get_media_base64() — baixa via Evolution API</text>
<text class="text-body" x="1070" y="983">OpenAI Whisper (whisper-1)</text>
<text class="text-body" x="1070" y="1006">language="pt"</text>
<text class="text-body" x="1070" y="1029">texto transcrito → buffer_message()</text>

<!-- Setas convergentes para buffer -->
<line class="line" x1="330" y1="1065" x2="700" y2="1140"/>
<line class="line" x1="1070" y1="1065" x2="700" y2="1140"/>

<!-- ── BUFFER ───────────────────────────────────────────────── -->
<rect class="box" x="300" y="1140" width="800" height="200" rx="14"/>
<text class="text-title" x="700" y="1175">message_buffer.py — Debounce com Redis</text>
<text class="text-body" x="700" y="1205">Armazena em {chat_id}_msg_buffer</text>
<text class="text-body" x="700" y="1230">Inicia timer de 3 segundos</text>
<text class="text-body" x="700" y="1255">Cancela e recria timer se nova mensagem chegar</text>
<text class="text-body" x="700" y="1280">Apos timeout — route_and_invoke()</text>

<line class="line" x1="700" y1="1340" x2="700" y2="1380"/>

<!-- ── ROUTER ─────────────────────────────────────────────── -->
<rect class="box" x="250" y="1380" width="900" height="260" rx="14"/>
<text class="text-title" x="700" y="1415">chains.py — route_and_invoke()</text>
<text class="text-body" x="700" y="1445">Busca historico no Redis / monta contexto da conversa</text>
<text class="text-body" x="700" y="1472">Router LLM classifica a intencao da pergunta</text>
<text class="text-body" x="700" y="1499">sql  →  dados de vendas, compras, faturamento</text>
<text class="text-body" x="700" y="1526">docs  →  documentos internos, politicas, contatos</text>
<text class="text-body" x="700" y="1553">ambos  →  executa os dois agentes em sequencia</text>
<text class="text-body" x="700" y="1580">geral  →  saudacoes e perguntas fora do escopo</text>

<!-- Segmento 1: Router → Labels (router bottom → label top) -->
<line class="line" x1="490" y1="1640" x2="225" y2="1675"/>
<line class="line" x1="700" y1="1640" x2="820" y2="1675"/>
<line class="line" x1="910" y1="1640" x2="1145" y2="1675"/>

