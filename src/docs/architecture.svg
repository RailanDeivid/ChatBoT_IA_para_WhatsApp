<svg width="1400" height="2500" viewBox="0 0 1400 2500"
xmlns="http://www.w3.org/2000/svg">

<style>
    .bg { fill: #0B0F19; }

    .box {
        fill: #111827;
        stroke: #00FF88;
        stroke-width: 2;
        rx: 14;
        filter: drop-shadow(0 0 8px #00FF88);
    }

    .agent {
        stroke: #A855F7;
        filter: drop-shadow(0 0 18px #A855F7);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { filter: drop-shadow(0 0 10px #A855F7); }
        50% { filter: drop-shadow(0 0 25px #A855F7); }
        100% { filter: drop-shadow(0 0 10px #A855F7); }
    }

    .text-title {
        fill: #00FF88;
        font-family: monospace;
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
    }

    .text-body {
        fill: #00FF88;
        font-family: monospace;
        font-size: 14px;
        text-anchor: middle;
    }

    .line {
        stroke: #00FF88;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 8;
        animation: dash 2s linear infinite;
    }

    .line-purple {
        stroke: #A855F7;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 8;
        animation: dash 2s linear infinite;
    }

    @keyframes dash {
        to { stroke-dashoffset: -20; }
    }
</style>

<rect class="bg" width="100%" height="100%"/>

<!-- USUARIO INICIAL -->
<rect class="box" x="300" y="40" width="800" height="90"/>
<text class="text-title" x="700" y="75">Usuario WhatsApp</text>
<text class="text-body" x="700" y="105">"Quanto foi comprado de alimentos no dia 26/02/2026?"</text>

<line class="line" x1="700" y1="130" x2="700" y2="180"/>

<!-- EVOLUTION API -->
<rect class="box" x="300" y="180" width="800" height="120"/>
<text class="text-title" x="700" y="215">Evolution API (porta 8080)</text>
<text class="text-body" x="700" y="245">Gateway que recebe, valida e encaminha mensagens</text>

<line class="line" x1="700" y1="300" x2="700" y2="350"/>

<!-- FASTAPI -->
<rect class="box" x="300" y="350" width="800" height="155"/>
<text class="text-title" x="700" y="378">app.py — Webhook FastAPI (porta 8000)</text>
<text class="text-body" x="700" y="403">Extrai chat_id, sender_name (pushName) e mensagem</text>
<text class="text-body" x="700" y="424">Filtra grupos (@g.us) e mensagens do proprio bot (fromMe)</text>
<text class="text-body" x="700" y="445">Ignora sticker, imagem sem legenda, reacao</text>
<text class="text-body" x="700" y="466">Detecta tipo da mensagem e roteia abaixo</text>

<!-- Setas divergentes do app.py -->
<line class="line" x1="500" y1="505" x2="330" y2="585"/>
<line class="line" x1="900" y1="505" x2="1070" y2="585"/>

<!-- Label "se for texto" (esquerda) -->
<rect fill="#0B0F19" stroke="#00FF88" stroke-width="1" rx="6" x="340" y="527" width="130" height="24"/>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="405" y="544">se for texto</text>

<!-- Label "se for audio" (direita) -->
<rect fill="#0B0F19" stroke="#00FF88" stroke-width="1" rx="6" x="930" y="527" width="130" height="24"/>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="995" y="544">se for audio</text>

<!-- COLUNA ESQUERDA: Texto direto -->
<rect class="box" x="80" y="585" width="500" height="160"/>
<text class="text-title" x="330" y="613">Texto direto</text>
<text class="text-body" x="330" y="640">mensagem extraida de conversation</text>
<text class="text-body" x="330" y="663">ou extendedTextMessage.text</text>
<text class="text-body" x="330" y="686">passa direto para buffer_message()</text>

<!-- COLUNA DIREITA: transcribe.py -->
<rect class="box" x="820" y="585" width="500" height="160"/>
<text class="text-title" x="1070" y="613">transcribe.py</text>
<text class="text-body" x="1070" y="640">get_media_base64() — baixa via Evolution API</text>
<text class="text-body" x="1070" y="663">OpenAI Whisper (whisper-1)</text>
<text class="text-body" x="1070" y="686">language="pt"</text>
<text class="text-body" x="1070" y="709">texto transcrito → buffer_message()</text>

<!-- Setas convergentes para buffer -->
<line class="line" x1="330" y1="745" x2="700" y2="820"/>
<line class="line" x1="1070" y1="745" x2="700" y2="820"/>

<!-- REDIS BUFFER -->
<rect class="box" x="300" y="820" width="800" height="220"/>
<text class="text-title" x="700" y="855">message_buffer.py — Debounce com Redis</text>
<text class="text-body" x="700" y="885">Armazena em {chat_id}_msg_buffer</text>
<text class="text-body" x="700" y="910">Inicia timer de 3 segundos</text>
<text class="text-body" x="700" y="935">Cancela e recria timer se nova mensagem chegar</text>
<text class="text-body" x="700" y="960">Apos timeout — invoke_sql_agent()</text>

<line class="line" x1="700" y1="1040" x2="700" y2="1090"/>

<!-- CHAINS -->
<rect class="box" x="300" y="1090" width="800" height="200"/>
<text class="text-title" x="700" y="1125">chains.py — invoke_sql_agent()</text>
<text class="text-body" x="700" y="1155">Busca historico no Redis</text>
<text class="text-body" x="700" y="1180">Monta prompt contextual completo</text>
<text class="text-body" x="700" y="1205">Executa AgentExecutor</text>

<line class="line-purple" x1="700" y1="1290" x2="700" y2="1340"/>

<!-- AGENT -->
<rect class="box agent" x="250" y="1340" width="900" height="220"/>
<text class="text-title" x="700" y="1380">LangChain ReAct Agent — GPT-4o</text>
<text class="text-body" x="700" y="1410">Fluxo: Thought — Action — Observation — Final Answer</text>
<text class="text-body" x="700" y="1440">Classifica intencao e seleciona ferramenta apropriada</text>

<!-- LINHAS AGENTE → TOOLS -->
<line class="line" x1="500" y1="1560" x2="355" y2="1700"/>
<line class="line" x1="900" y1="1560" x2="1045" y2="1700"/>

<!-- LABEL roteamento esquerda -->
<rect fill="#0B0F19" stroke="#00FF88" stroke-width="1" rx="6" x="272" y="1604" width="310" height="52"/>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="427" y="1624">pergunta de vendas /</text>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="427" y="1644">faturamento / receita</text>

<!-- LABEL roteamento direita -->
<rect fill="#0B0F19" stroke="#00FF88" stroke-width="1" rx="6" x="817" y="1604" width="310" height="52"/>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="972" y="1624">pergunta de compras /</text>
<text fill="#FACC15" font-family="monospace" font-size="13px" font-weight="bold" text-anchor="middle" x="972" y="1644">pedidos / fornecedores</text>

<!-- TOOLS -->
<rect class="box" x="80" y="1700" width="550" height="180"/>
<text class="text-title" x="355" y="1735">DremioSalesQueryTool</text>
<text class="text-body" x="355" y="1765">Consulta via dremio.client()</text>
<text class="text-body" x="355" y="1790">Executa REST API — retorna DataFrame</text>

<rect class="box" x="770" y="1700" width="550" height="180"/>
<text class="text-title" x="1045" y="1735">MySQLPurchasesQueryTool</text>
<text class="text-body" x="1045" y="1765">Consulta via mysql.client()</text>
<text class="text-body" x="1045" y="1790">Busca tabela_compras — retorna DataFrame</text>

<line class="line" x1="355" y1="1880" x2="700" y2="1960"/>
<line class="line" x1="1045" y1="1880" x2="700" y2="1960"/>

<!-- POS PROCESSAMENTO -->
<rect class="box" x="300" y="1960" width="800" height="180"/>
<text class="text-title" x="700" y="1995">chains.py — Pos-processamento</text>
<text class="text-body" x="700" y="2025">Salva historico atualizado no Redis</text>
<text class="text-body" x="700" y="2050">Retorna resposta formatada</text>

<line class="line-purple" x1="700" y1="2140" x2="700" y2="2210"/>

<!-- ENVIO -->
<rect class="box" x="300" y="2210" width="800" height="140"/>
<text class="text-title" x="700" y="2245">integrations/evolution_api.py</text>
<text class="text-body" x="700" y="2275">send_whatsapp_message()</text>
<text class="text-body" x="700" y="2300">POST — Evolution API — WhatsApp</text>

<line class="line" x1="700" y1="2350" x2="700" y2="2390"/>

<!-- USUARIO FINAL -->
<rect class="box" x="300" y="2390" width="800" height="90"/>
<text class="text-title" x="700" y="2425">Usuario WhatsApp</text>
<text class="text-body" x="700" y="2455">"Em janeiro foram vendidos R$ 45.230,00"</text>

</svg>
