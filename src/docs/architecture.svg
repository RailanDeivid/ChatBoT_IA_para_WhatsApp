<text fill="#FACC15" font-family="monospace" font-size="12px" font-weight="bold" text-anchor="middle" x="225" y="1714">vendas • delivery • pgto • compras</text>

<rect fill="#0B0F19" stroke="#00FF88" stroke-width="1" rx="6" x="710" y="1675" width="220" height="46"/>
