<svg width="1800" height="1980" viewBox="0 0 1800 1980" xmlns="http://www.w3.org/2000/svg">
<style>
  .bg   { fill: #0B0F19; }

  /* ── boxes ── */
  .card         { fill: #111827; stroke: #00FF88; stroke-width: 2; filter: drop-shadow(0 0 6px #00FF8844); }
  .card-yellow  { fill: #111827; stroke: #FACC15; stroke-width: 2; filter: drop-shadow(0 0 6px #FACC1544); }
  .card-red     { fill: #1a0f0f; stroke: #EF4444; stroke-width: 2; filter: drop-shadow(0 0 6px #EF444444); }
  .card-purple  { fill: #0f0f1a; stroke: #A855F7; stroke-width: 2; filter: drop-shadow(0 0 10px #A855F766);
                  animation: glow 2.5s ease-in-out infinite; }
  .card-tool    { fill: #0d1a14; stroke: #00CC6A; stroke-width: 1.5; }

  @keyframes glow {
    0%,100% { filter: drop-shadow(0 0 8px #A855F766); }
    50%     { filter: drop-shadow(0 0 20px #A855F7AA); }
  }

  /* ── text ── */
  .t-head   { font-family: monospace; font-size: 23px; font-weight: bold; text-anchor: middle; fill: #00FF88; }
  .t-head-y { font-family: monospace; font-size: 23px; font-weight: bold; text-anchor: middle; fill: #FACC15; }
  .t-head-p { font-family: monospace; font-size: 23px; font-weight: bold; text-anchor: middle; fill: #C084FC; }
  .t-sub    { font-family: monospace; font-size: 17px; text-anchor: middle; fill: #6EE7B7; }
  .t-sub-y  { font-family: monospace; font-size: 17px; text-anchor: middle; fill: #FDE68A; }
  .t-sub-r  { font-family: monospace; font-size: 17px; text-anchor: middle; fill: #FCA5A5; }
  .t-sub-p  { font-family: monospace; font-size: 17px; text-anchor: middle; fill: #D8B4FE; }
  .t-label  { font-family: monospace; font-size: 15px; font-weight: bold; text-anchor: middle; fill: #FACC15; }
  .t-tool   { font-family: monospace; font-size: 16px; font-weight: bold; text-anchor: middle; fill: #34D399; }
  .t-tool-s { font-family: monospace; font-size: 14px; text-anchor: middle; fill: #6EE7B7; }

  /* ── arrows ── */
  .arr      { stroke: #00FF88; stroke-width: 2; fill: none; marker-end: url(#ah-green); }
  .arr-y    { stroke: #FACC15; stroke-width: 2; fill: none; stroke-dasharray: 6 3; marker-end: url(#ah-yellow); }
  .arr-r    { stroke: #EF4444; stroke-width: 2; fill: none; stroke-dasharray: 6 3; marker-end: url(#ah-red); }
  .arr-p    { stroke: #A855F7; stroke-width: 2; fill: none; marker-end: url(#ah-purple); }
  .arr-d    { stroke: #4ADE80; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; marker-end: url(#ah-green2); }

  /* ── divider ── */
  .divider  { stroke: #1F2937; stroke-width: 1; fill: none; }

  /* ── badge ── */
  .badge-g  { fill: #052e16; stroke: #00FF88; stroke-width: 1; }
  .badge-y  { fill: #1c1400; stroke: #FACC15; stroke-width: 1; }
  .badge-p  { fill: #0f0520; stroke: #A855F7; stroke-width: 1; }
</style>

<!-- ── arrowhead markers ── -->
<defs>
  <marker id="ah-green"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#00FF88"/>
  </marker>
  <marker id="ah-green2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#4ADE80"/>
  </marker>
  <marker id="ah-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#FACC15"/>
  </marker>
  <marker id="ah-red"    markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#EF4444"/>
  </marker>
  <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#A855F7"/>
  </marker>
</defs>

<rect class="bg" width="100%" height="100%"/>

<!-- ════════════════════════════════════════════════════
     SEÇÃO 1 — ENTRADA (WhatsApp → App)
     ════════════════════════════════════════════════════ -->

<!-- 1.1 Usuário -->
<rect class="card" x="500" y="30" width="800" height="76" rx="12"/>
<text class="t-head" x="900" y="60">Usuario WhatsApp</text>
<text class="t-sub"  x="900" y="82">mensagem de texto ou audio</text>

<line class="arr" x1="900" y1="106" x2="900" y2="136"/>

<!-- 1.2 Evolution API -->
<rect class="card" x="500" y="140" width="800" height="76" rx="12"/>
<text class="t-head" x="900" y="170">Evolution API  —  porta 8080</text>
<text class="t-sub"  x="900" y="192">gateway WhatsApp: recebe, valida e encaminha</text>

<line class="arr" x1="900" y1="216" x2="900" y2="246"/>

<!-- 1.3 App.py -->
<rect class="card" x="500" y="250" width="800" height="110" rx="12"/>
<text class="t-head" x="900" y="278">app.py  —  Webhook FastAPI  (porta 8000)</text>
<text class="t-sub"  x="900" y="300">extrai chat_id · sender_name · texto da mensagem</text>
<text class="t-sub"  x="900" y="318">filtra grupos @g.us · fromMe · sticker · imagem sem legenda</text>
<text class="t-sub"  x="900" y="336">detecta tipo (texto / audio) e verifica acesso</text>

<line class="arr" x1="900" y1="360" x2="900" y2="390"/>

<!-- ════════════════════════════════════════════════════
     SEÇÃO 2 — CONTROLE DE ACESSO
     ════════════════════════════════════════════════════ -->
<rect class="card-yellow" x="500" y="394" width="800" height="170" rx="12"/>
<text class="t-head-y" x="900" y="424">Controle de Acesso  —  access_control.py</text>
<text class="t-sub-y"  x="900" y="452">SQLite  data/access.db   ·   verifica telefone do remetente</text>

<!-- divisor interno -->
<line class="divider" x1="520" y1="468" x2="1280" y2="468"/>

<!-- 3 saídas possíveis — colunas em 650 · 900 · 1150 -->
<text class="t-sub-r" x="650" y="492">✗ Nao autorizado</text>
<text class="t-sub-y" x="900" y="492">△ Admin + /comando</text>
<text class="t-sub"   x="1150" y="492">✓ Autorizado</text>

<text class="t-sub-r" x="650" y="518">→ bloqueia · encerra</text>
<text class="t-sub-y" x="900" y="518">→ executa · encerra</text>
<text class="t-sub"   x="1150" y="518">→ continua fluxo</text>

<!-- Seta blocked — loop lateral direito (curva suave) -->
<path class="arr-r" d="M1300,492 C1580,492 1580,106 1300,106" fill="none"/>
<text class="t-sub-r" x="1560" y="299" font-size="14px" text-anchor="middle" transform="rotate(-90,1560,299)">bloqueado</text>

<!-- Cmd Admin — caixa lateral esquerda -->
<line class="arr-y" x1="500" y1="492" x2="280" y2="492"/>
<rect class="card-yellow" x="50" y="436" width="230" height="130" rx="10"/>
<text class="t-head-y" x="165" y="462" font-size="17px">Cmd Admin</text>
<text class="t-sub-y"  x="165" y="486" font-size="14px">/autorizar · /bloquear</text>
<text class="t-sub-y"  x="165" y="506" font-size="14px">/remover · /desbloquear</text>
<text class="t-sub-y"  x="165" y="526" font-size="14px">/usuarios · /ajuda</text>

<!-- somente "Autorizado" continua -->
<line class="arr" x1="900" y1="564" x2="900" y2="578"/>

<!-- ════════════════════════════════════════════════════
     SEÇÃO 3 — PRÉ-PROCESSAMENTO (Texto / Áudio)
     ════════════════════════════════════════════════════ -->
<rect class="card" x="500" y="578" width="800" height="110" rx="12"/>
<text class="t-head" x="900" y="606">Pre-processamento de Mensagem</text>
<line class="divider" x1="520" y1="618" x2="1280" y2="618"/>

<!-- duas colunas -->
<text class="t-sub"  x="700" y="638" font-weight="bold">Texto</text>
<text class="t-sub"  x="700" y="656">extrai conversation /</text>
<text class="t-sub"  x="700" y="672">extendedTextMessage.text</text>

<line x1="900" y1="622" x2="900" y2="684" stroke="#1F2937" stroke-width="1"/>

<text class="t-sub"  x="1100" y="638" font-weight="bold">Audio  →  Whisper</text>
<text class="t-sub"  x="1100" y="656">get_media_base64() via Evolution</text>
<text class="t-sub"  x="1100" y="672">OpenAI whisper-1  ·  language=pt</text>

<line class="arr" x1="900" y1="688" x2="900" y2="718"/>

<!-- ════════════════════════════════════════════════════
     SEÇÃO 4 — BUFFER
     ════════════════════════════════════════════════════ -->
<rect class="card" x="500" y="722" width="800" height="120" rx="12"/>
<text class="t-head" x="900" y="750">message_buffer.py  —  Debounce Redis</text>
<text class="t-sub"  x="900" y="772">acumula mensagens do mesmo chat em {chat_id}_msg_buffer</text>
<text class="t-sub"  x="900" y="792">timer 3 s — reinicia a cada nova msg — dispara route_and_invoke()</text>
<text class="t-sub"  x="900" y="812">TTL 5 min no Redis  ·  histórico de conversa 24 h</text>

<line class="arr" x1="900" y1="842" x2="900" y2="872"/>

<!-- ════════════════════════════════════════════════════
     SEÇÃO 5 — ROUTER
     ════════════════════════════════════════════════════ -->
<rect class="card" x="500" y="876" width="800" height="140" rx="12"/>
<text class="t-head" x="900" y="906">Router LLM  —  chains.py</text>
<text class="t-sub"  x="900" y="930">classifica a intenção da pergunta em uma de quatro rotas</text>
<line class="divider" x1="520" y1="944" x2="1280" y2="944"/>
<text class="t-sub"  x="700" y="962">sql  →  dados / faturamento</text>
<text class="t-sub"  x="1100" y="962">docs  →  documentos internos</text>
<text class="t-sub"  x="700" y="980">ambos  →  dados + documentos</text>
<text class="t-sub"  x="1100" y="980">geral  →  saudações / fora escopo</text>
<text class="t-sub"  x="900" y="1000" fill="#6B7280">em caso de resposta inválida do Router: fallback → sql</text>

<!-- ════════════════════════════════════════════════════
     SEÇÃO 6 — AGENTES  (3 colunas)
     ════════════════════════════════════════════════════ -->

