<text class="text-body" x="360" y="1808">ReAct: Thought / Action / Observation / Final Answer</text>
<text class="text-body" x="360" y="1833">Ferramentas: Dremio (vendas + delivery + pagamentos) + MySQL (compras)</text>
<text class="text-body" x="360" y="1858">Prompt: regras SQL, SSS, confidencialidade</text>

<!-- ── LLM DIRETO — GERAL (centro) ──────────────────────── -->
